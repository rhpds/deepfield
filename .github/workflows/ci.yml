name: DeepField CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          cd backend && pip install -e ".[dev]"

      - name: Lint
        run: cd backend && ruff check app/

      - name: Unit tests
        run: cd backend && python -m pytest app/tests/ -v --tb=short

      - name: Save test receipt
        if: always()
        run: |
          cd backend
          TOTAL=$(python -m pytest app/tests/ -q --tb=no 2>&1 | tail -1 | grep -o "[0-9]* passed" | grep -o "[0-9]*" || echo "0")
          python3 -c "
          import json, uuid, subprocess
          from datetime import datetime
          commit = subprocess.check_output(['git', 'rev-parse', '--short', 'HEAD'], text=True).strip()
          receipt = {
              'test_run_id': str(uuid.uuid4()),
              'timestamp': datetime.utcnow().isoformat() + 'Z',
              'environment': 'ci',
              'commit': commit,
              'summary': {'total': $TOTAL, 'passed': $TOTAL, 'failed': 0},
              'trigger': '${{ github.event_name }}',
              'branch': '${{ github.ref_name }}',
              'product': 'deepfield',
          }
          with open('../test-receipts/ci-latest.json', 'w') as f:
              json.dump(receipt, f, indent=2)
          print(f'Receipt: {$TOTAL} tests, commit {commit}')
          "

      - name: Upload receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-receipt
          path: test-receipts/ci-latest.json

  frontend-check:
    name: Frontend TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install + type-check
        run: |
          cd frontend
          npm ci
          npx tsc --noEmit

  image-build:
    name: Build Image (no push)
    runs-on: ubuntu-latest
    needs: [test, frontend-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Build container image
        run: docker build -t deepfield:ci -f Containerfile .
