apiVersion: v1
kind: ConfigMap
metadata:
  name: deepfield-config
  namespace: deepfield
  labels:
    app: deepfield
data:
  inference-endpoints.yaml: |
    # All inference routed through LiteLLM proxy (MAAS)
    # Configure LITELLM_API_BASE and LITELLM_API_KEY in secrets
    #
    # Macro agents — Gaudi 3 GPU (deep reasoning via LiteLLM)
    #   deepseek-r1-distill-qwen-14b
    #   microsoft-phi-4
    #   qwen3-14b
    #
    # Micro agents — CPU models (fast triage via LiteLLM)
    #   granite-4-0-h-tiny
    #   codellama-7b-instruct
    #   granite-3-2-8b-instruct
    #
    # Cluster monitoring is read-only (GET/Watch only)
    # Configure cluster endpoints via CLUSTER_1_NAME, CLUSTER_1_API_URL, etc.
