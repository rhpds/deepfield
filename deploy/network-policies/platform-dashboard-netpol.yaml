---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-router-and-internal
  namespace: platform-dashboard
spec:
  podSelector: {}
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          network.openshift.io/policy-group: ingress
  - from:
    - podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-ecosystem
  namespace: platform-dashboard
spec:
  podSelector: {}
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ecosystem-kafka
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ecosystem-redis
  policyTypes:
  - Ingress
