apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepfield-backend
  namespace: deepfield
  labels:
    app: deepfield
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deepfield
      component: backend
  template:
    metadata:
      labels:
        app: deepfield
        component: backend
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: backend
          image: image-registry.openshift-image-registry.svc:5000/deepfield/deepfield-backend:latest
          ports:
            - containerPort: 8099
          envFrom:
            - secretRef:
                name: deepfield-secrets
          env:
            - name: THANOS_URL
              valueFrom:
                secretKeyRef:
                  name: deepfield-secrets
                  key: THANOS_URL
                  optional: true
          resources:
            requests:
              cpu: 750m
              memory: 3Gi
            limits:
              cpu: "2"
              memory: 6Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8099
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8099
            initialDelaySeconds: 15
            periodSeconds: 30
