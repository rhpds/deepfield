---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepfield-backend
  namespace: deepfield
  labels:
    app: deepfield
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deepfield
      component: backend
  template:
    metadata:
      labels:
        app: deepfield
        component: backend
    spec:
      serviceAccountName: deepfield-oauth
      securityContext:
        runAsNonRoot: true
      containers:
      - name: backend
        image: image-registry.openshift-image-registry.svc:5000/deepfield/deepfield-backend:latest
        ports:
        - containerPort: 8099
        envFrom:
        - secretRef:
            name: deepfield-secrets
        env:
        - name: THANOS_URL
          valueFrom:
            secretKeyRef:
              name: deepfield-secrets
              key: THANOS_URL
              optional: true
        resources:
          requests:
            cpu: 750m
            memory: 3Gi
          limits:
            cpu: '2'
            memory: 6Gi
        readinessProbe:
          httpGet:
            path: /health
            port: 8099
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8099
          initialDelaySeconds: 15
          periodSeconds: 30
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      - name: oauth-proxy
        image: registry.redhat.io/openshift4/ose-oauth-proxy-rhel9:latest
        args:
        - -provider=openshift
        - -http-address=:8080
        - -https-address=
        - -email-domain=*
        - -upstream=http://localhost:8099/
        - -client-id=deepfield-oauth-client
        - -client-secret-file=/etc/proxy/secrets/client-secret
        - -cookie-secret-file=/etc/proxy/secrets/session_secret
        - -openshift-service-account=deepfield-oauth
        - -openshift-ca=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        - -skip-auth-regex=^/(health|api/v1/(health|integration/events))
        - -upstream-timeout=180s
        - -pass-user-headers=true
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /oauth/healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /oauth/healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
        volumeMounts:
        - mountPath: /etc/proxy/secrets
          name: oauth-proxy-secret
          readOnly: true
      volumes:
      - name: oauth-proxy-secret
        secret:
          secretName: deepfield-oauth-secret
